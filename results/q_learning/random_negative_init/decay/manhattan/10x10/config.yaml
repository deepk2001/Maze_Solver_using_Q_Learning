agent: Q-learning
evaluation:
  display: true
  enabled: true
  episodes: 1
  fps: 8
  max_steps: 50
  num_videos: 5
  save_video: true
  video_heatmap: true
hyperparameters:
  discount_rate: 0.99
  epsilon: 1.0
  epsilon_decay: 0.995
  epsilon_min: 0.05
  epsilon_policy: decay
  learning_rate: 0.1
  q_init_random_high: 0.0
  q_init_random_low: -0.5
  q_init_strategy: random_negative
maze_file: mazes/10x10.txt
reward:
  beta: 0.1
  eta: 0.01
  goal_reward: 1.0
  mode: manhattan
training:
  episodes: 800
  max_steps: 200
  render: true
  render_heatmap: true
viz:
  num_plots: 4
  window_size: null

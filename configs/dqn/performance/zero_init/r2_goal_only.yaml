device: cuda
agent: "DQN"
maze_file: "mazes/10x10.txt"

reward:
  mode: "goal_only"
  goal_reward: 1.0
  other_reward: 0.0

hyperparameters:
  learning_rate: 0.001
  discount_rate: 0.99
  hidden_size: 256
  q_init_strategy: "zero"
  epsilon_policy: "performance_based"
  epsilon: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.99
  batch_size: 512
  target_update: 10

training:
  episodes: 700
  max_steps: 200
  render: False
  render_heatmap: True

evaluation:
  enabled: True
  num_videos: 5
  episodes: 1
  max_steps: 50
  save_video: True
  video_heatmap: True
  display: True
  fps: 8

viz:
  num_plots: 4
  window_size: null


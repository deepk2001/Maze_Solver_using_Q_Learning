agent: "Q-learning"
maze_file: "mazes/10x10.txt"

reward:
  mode: "goal_only"  # Reward function: goal_reward at goal, otherwise other_reward.
  goal_reward: 1.0  # Reward returned when agent reaches goal (done=True).
  other_reward: 0.0  # Reward for all non-goal transitions in goal_only mode.

hyperparameters:
  learning_rate: 0.10
  discount_rate: 0.99
  q_init_strategy: "random_negative"
  q_init_random_low: -0.5
  q_init_random_high: 0.0
  epsilon_policy: "decay"
  epsilon: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995

training:
  episodes: 500
  max_steps: 200
  render: True
  render_heatmap: True

evaluation:
  enabled: True
  num_videos: 5
  episodes: 1
  max_steps: 50
  save_video: True
  video_heatmap: True
  display: True
  fps: 8

viz:
  num_plots: 4
  window_size: null
